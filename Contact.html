<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Page</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f2f2f2;
      margin: 0;
    }

    header {
      background-color: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
      text-align: center;
      padding: 10px;
      background: #555;
    }

    nav a {
      color: white;
      margin: 10px;
      text-decoration: none;
    }

    .container {
      width: 300px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: green;
    }

    footer {
      text-align: center;
      padding: 10px;
      background: #333;
      color: white;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Contact Us</h1>
  </header>

  <nav>
    <a href="index.html">Home</a>
  </nav>

  <div class="container">

    <form>

      <label for="name">Name:</label>
      <input type="text" id="name" placeholder="Enter your name" required>

      <label for="email">Email:</label>
      <input type="email" id="email" placeholder="Enter your email" required>

      <label for="message">Message:</label>
      <textarea id="message" rows="4" placeholder="Your message"></textarea>

      <button type="submit">Send</button>

    </form>

  </div>

  <footer>
    <p>© 2026 My Website</p>
  </footer>

</body>
</html>
